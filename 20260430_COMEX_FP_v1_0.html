ong>${step.n}</strong>${step.label||''}`;sw.appendChild(sl);const sbl={};rs.forEach(s=>{sbl[s.lane]=s});lanes.forEach((lk,idx)=>{const ln=LANES[lk];const il=(idx===lanes.length-1);const lc=el('div',{class:`lc ${ln.color}-bg${il?' last-col':''}`});if(sbl[lk]){const s=sbl[lk];const cd=el('div',{class:`card ${s.variant}`});cd.appendChild(el('div',{class:'card-title'},s.title));cd.appendChild(el('div',{class:'card-desc',html:s.desc}));if(s.tags&&s.tags.length){const td=el('div',{class:'card-tags'});s.tags.forEach(t=>td.appendChild(el('span',{class:'ctag'},t)));cd.appendChild(td)}if(s.cite)cd.appendChild(el('span',{class:'cite'},s.cite));if(s.pill)cd.appendChild(el('div',{class:`auto-pill auto-${s.pill.color}`,html:s.pill.text}));lc.appendChild(cd)}sw.appendChild(lc)});const ni=j;const hn=ni<steps.length;const ne=hn&&steps[ni].divider&&steps[ni].type==='end';if(hn&&!ne){let ns=null;let k=ni;while(k<steps.length){if(!steps[k].divider){ns=steps[k];break}k++}sw.appendChild(el('div',{class:'ar-corner'}));lanes.forEach((lk,idx)=>{const ln=LANES[lk];const il=(idx===lanes.length-1);const ar=el('div',{class:`ar ${ln.color}-bg${il?' last-col':''}`});if(ns&&ns.lane===lk){const v=el('div',{class:`varr ${ln.color}`});v.appendChild(el('div',{class:'sh'}));v.appendChild(el('div',{class:'hd'}));ar.appendChild(v)}sw.appendChild(ar)})}i=j}dr.appendChild(sw);const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');svg.setAttribute('class','ov');svg.setAttribute('id','ov');dr.appendChild(svg);a.appendChild(dw);requestAnimationFrame(()=>drawArrows(proc))}
function drawArrows(proc){const svg=document.getElementById('ov');if(!svg)return;const w=svg.parentElement,wr=w.getBoundingClientRect();svg.innerHTML='';const ns='http://www.w3.org/2000/svg';const d=document.createElementNS(ns,'defs');['comex','com','cont','inv','ext','adm'].forEach(c=>{const hex=getComputedStyle(document.documentElement).getPropertyValue('--'+c).trim()||'#ccc';const mk=document.createElementNS(ns,'marker');mk.setAttribute('id','m'+c);mk.setAttribute('markerWidth','8');mk.setAttribute('markerHeight','8');mk.setAttribute('refX','7');mk.setAttribute('refY','3');mk.setAttribute('orient','auto');const p=document.createElementNS(ns,'path');p.setAttribute('d','M0,0 L0,6 L8,3 z');p.setAttribute('fill',hex);mk.appendChild(p);d.appendChild(mk)});svg.appendChild(d);if(!proc.arrows||!proc.arrows.length)return;const cards=Array.from(document.querySelectorAll('.card'));if(cards.length<2)return;proc.arrows.forEach(a=>{if(a.from>=cards.length||a.to>=cards.length)return;const c1r=cards[a.from].getBoundingClientRect();const c2r=cards[a.to].getBoundingClientRect();const c1={cx:c1r.left-wr.left+c1r.width/2,cy:c1r.top-wr.top+c1r.height/2,r:c1r.right-wr.left,l:c1r.left-wr.left};const c2={cx:c2r.left-wr.left+c2r.width/2,cy:c2r.top-wr.top+c2r.height/2,r:c2r.right-wr.left,l:c2r.left-wr.left};const hex=getComputedStyle(document.documentElement).getPropertyValue('--'+a.lane).trim();const p=document.createElementNS(ns,'path');if(Math.abs(c1.cy-c2.cy)<50){p.setAttribute('d',`M${c1.r},${c1.cy} L${c2.l},${c2.cy}`)}else{p.setAttribute('d',`M${c1.r},${c1.cy} H${(c1.r+c2.l)/2} V${c2.cy} H${c2.l}`)}p.setAttribute('stroke',hex);p.setAttribute('stroke-width','2');p.setAttribute('fill','none');p.setAttribute('stroke-dasharray','6,3');p.setAttribute('marker-end',`url(#m${a.lane})`);svg.appendChild(p);const t=document.createElementNS(ns,'text');t.setAttribute('x',(c1.r+c2.l)/2);t.setAttribute('y',Math.min(c1.cy,c2.cy)-5);t.setAttribute('text-anchor','middle');t.setAttribute('font-size','
